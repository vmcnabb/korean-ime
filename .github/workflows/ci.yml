name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install dependencies
        run: npm ci

      # check + lint + check-translations + test, in one aggregate.
      - name: Validate
        run: npm run validate

      # Report coverage (not enforced — no thresholds). Kept separate from the
      # Validate gate so pass/fail runs on plain, uninstrumented tests; the
      # text-summary lands in the step log.
      - name: Coverage report
        run: npm run test:coverage

      # Builds are pure (no gates) since validate covers them; build both
      # targets so a Chrome- or Firefox-specific build regression is caught.
      - name: Build (Chrome + Firefox)
        run: npm run build

      # web-ext lint needs the built dist-firefox/ from the step above.
      - name: Lint Firefox build
        run: npm run lint:firefox
