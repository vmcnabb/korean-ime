<!DOCTYPE html>
<html>
    <head>
        <title>Test input events</title>
        <script src="watch-events.js"></script>
        <link rel="stylesheet" href="watch-events.css" />
    </head>
    <body>
        <h1>Test input events</h1>
        <h2>div[contenteditable=true]</h2>
        <div contenteditable="true" id="divContentEditable"></div>
        <h2>input[type=text]</h2>
        <input type="text" id="input" />

        <div>
            <label>
                <input type="checkbox" id="silence" />
                Silence
            </label>
            <label>
                <input type="checkbox" id="silence-document" />
                Silence Document
            </label>
            <label>
                <input type="checkbox" checked id="silence-div" />
                Silence Div
            </label>
            <label>
                <input type="checkbox" checked id="silence-input" />
                Silence Input
            </label>
        </div>
    </body>
</html>
